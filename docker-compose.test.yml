version: '3.8'

services:

  automation-tests:
    image: automation-tests:latest
    environment:
      GATEWAY_URL: http://api-gateway:8080
      TEST_ENV: docker
      PUSHGATEWAY_URL: http://pushgateway:9091
    volumes:
      - ./test-results:/app/test-results
    networks:
      - microservices

  pushgateway:
    image: prom/pushgateway
    ports:
      - "9091:9091"
    networks:
      - microservices

networks:
  microservices:
    external: true