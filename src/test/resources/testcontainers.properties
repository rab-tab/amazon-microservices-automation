# Disable Docker Machine detection
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy

# For Windows, use this instead:
# docker.client.strategy=org.testcontainers.dockerclient.NpipeSocketClientProviderStrategy

# Disable checks that might slow down startup
checks.disable=true

# Reuse containers between test runs (optional, speeds up development)
testcontainers.reuse.enable=false